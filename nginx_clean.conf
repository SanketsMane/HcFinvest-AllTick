server {
    listen 443 ssl;
    server_name testing.hcfinvest.com;

    ssl_certificate /etc/letsencrypt/live/testing.hcfinvest.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testing.hcfinvest.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/hc-finvest/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io Proxy
    location /socket.io {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads
    location /uploads {
        alias /var/www/hc-finvest/backend/uploads;
    }
}

server {
    listen 80;
    server_name testing.hcfinvest.com 143.198.106.204;
    return 301 https://testing.hcfinvest.com$request_uri;
}
