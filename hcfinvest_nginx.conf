server {
    listen 443 ssl;
    server_name admin.hcfinvest.com;

    ssl_certificate /etc/letsencrypt/live/hcfinvest.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hcfinvest.com/privkey.pem;

    root /home/hcfinvest/hcfinvest/frontend/dist;

    location /api {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = / {
        return 301 /admin;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    if ($host = www.hcfinvest.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = hcfinvest.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name hcfinvest.com www.hcfinvest.com;
    return 404;
}

